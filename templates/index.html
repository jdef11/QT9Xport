<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QT9 Document Downloader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6f9;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,.1);
      padding: 36px 40px;
      width: 100%;
      max-width: 480px;
    }
    h1 {
      font-size: 1.35rem;
      font-weight: 700;
      margin: 0 0 6px;
      color: #1a1a2e;
    }
    .subtitle {
      font-size: 0.85rem;
      color: #666;
      margin: 0 0 28px;
    }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 5px;
    }
    textarea, input[type="text"], input[type="password"] {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #d0d5dd;
      border-radius: 6px;
      font-size: 0.9rem;
      color: #333;
      outline: none;
      transition: border-color .15s;
    }
    textarea:focus, input:focus {
      border-color: #1a6ef5;
      box-shadow: 0 0 0 3px rgba(26,110,245,.12);
    }
    textarea {
      height: 90px;
      resize: vertical;
      font-family: monospace;
      font-size: 0.88rem;
    }
    .field { margin-bottom: 18px; }
    .hint {
      font-size: 0.78rem;
      color: #888;
      margin-top: 4px;
    }
    .row2 { display: flex; gap: 14px; }
    .row2 .field { flex: 1; }
    button[type="submit"] {
      width: 100%;
      padding: 11px;
      background: #1a6ef5;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: background .15s;
    }
    button[type="submit"]:hover { background: #145ad4; }
    button[type="submit"]:active { background: #1050b8; }
  </style>
</head>
<body>
  <div class="card">
    <h1>QT9 Document Downloader</h1>
    <p class="subtitle">Download specific QMS documents by reference number.</p>

    <form action="/start" method="post">

      <div class="field">
        <label for="doc_refs">Document Reference Numbers</label>
        <textarea
          id="doc_refs"
          name="doc_refs"
          placeholder="QMSD-0411, QMSD-1091&#10;SDS-0032"
          required
          spellcheck="false"
          autocomplete="off"
        ></textarea>
        <div class="hint">Separate references with commas or new lines. Matching is prefix-based (e.g. "QMSD-0411" matches "QMSD-0411 Rev 02 ...").</div>
      </div>

      <div class="row2">
        <div class="field">
          <label for="username">QT9 Username</label>
          <input type="text" id="username" name="username" autocomplete="username" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required>
        </div>
      </div>

      <button type="submit">Download Documents</button>

    </form>
  </div>
</body>
</html>
